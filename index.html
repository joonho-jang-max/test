<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>웹툰 검색</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .phone {
      width: 100%;
      max-width: 390px;
      background: #121212;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── 페이지 푸시 ── */
    .page-main {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
      will-change: transform;
    }

    .phone-header {
      flex-shrink: 0;
      background: #000;
      z-index: 10;
    }

    .phone-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      min-height: 0;
    }
    .phone.event-open .page-main {
      transform: translateX(-30%);
    }
    .page-event {
      position: absolute;
      inset: 0;
      background: #121212;
      transform: translateX(100%);
      transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
      will-change: transform;
      z-index: 100;
      overflow-y: auto;
    }
    .phone.event-open .page-event {
      transform: translateX(0);
    }
    .page-event-img {
      width: 100%;
      display: block;
    }
    .page-event-back {
      position: sticky;
      top: 16px;
      left: 16px;
      width: 36px;
      height: 36px;
      background: rgba(0,0,0,0.5);
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 101;
      margin: 16px 0 0 16px;
    }

    /* ── 상단 네비 ── */
    .top-nav {
      background: none;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px 0 17px;
    }

    .top-nav-title {
      font-family: 'Apple SD Gothic Neo', 'Pretendard', -apple-system, sans-serif;
      font-size: 17px;
      font-weight: 700;
      line-height: 22px;
      letter-spacing: -0.17px;
      color: #fff;
    }

    .top-nav-right {
      display: flex;
      align-items: center;
    }

    .nav-cookie-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      width: 28px;
      height: 28px;
    }

    .nav-free-cookie {
      position: absolute;
      height: 28px;
      width: auto;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
    }

    .nav-icon-img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      position: relative;
      z-index: 1;
    }

    .nav-icon-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .nav-icon-btn img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .top-nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-right: 8px;
    }

    /* ── 검색바 ── */
    .top-bar {
      background: none;
      padding: 0;
    }

    .search-row {
      display: flex;
      align-items: center;
      padding: 8px 16px 12px;
    }

    .search-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(144, 144, 144, 0.20);
      border-radius: 4px;
      padding: 0 8px 0 12px;
      height: 44px;
    }

    .search-icon-btn {
      background: none;
      border: none;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
    }

    .search-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .input-area {
      flex: 1;
      position: relative;
      height: 100%;
      overflow: hidden;
    }

    .search-input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 15px;
      font-family: 'Pretendard', -apple-system, sans-serif;
      caret-color: #00C73C;
      z-index: 1;
    }
    .search-input::placeholder { color: transparent; }

    .rolling-placeholder {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .rolling-track {
      display: flex;
      flex-direction: column;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .rolling-track span {
      height: 44px;
      display: flex;
      align-items: center;
      white-space: nowrap;
      color: #888;
      font-size: 15px;
      font-family: 'Pretendard', -apple-system, sans-serif;
      flex-shrink: 0;
    }



    .search-clear {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      align-items: center;
      justify-content: center;
    }

    .search-cancel {
      display: none;
      background: none;
      border: none;
      color: #fff;
      font-size: 15px;
      font-family: 'Pretendard', -apple-system, sans-serif;
      cursor: pointer;
      padding: 0 0 0 10px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* 검색 활성화 상태 */
    .search-row.active .search-cancel { display: block; }
    .search-row.has-value .search-clear { display: flex; }

    /* ── 검색결과 패널 ── */
    .search-results {
      display: none;
      flex-direction: column;
      background: #121212;
      flex: 1;
      overflow-y: auto;
    }

    .search-results.visible {
      display: flex;
    }

    .search-result-section {
      padding: 14px 16px 4px;
      font-family: 'Pretendard', -apple-system, sans-serif;
      font-size: 13px;
      color: #666;
    }

    .search-result-item {
      display: flex;
      align-items: center;
      height: 48px;
      padding: 0 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
    }

    .search-result-item:active { background: rgba(255,255,255,0.05); }

    .search-result-text {
      font-family: 'Apple SD Gothic Neo', 'Pretendard', -apple-system, sans-serif;
      font-size: 15px;
      color: #fff;
    }

    .search-result-text mark {
      background: none;
      color: #00C73C;
      font-weight: 600;
    }

    .search-result-badge {
      font-family: 'Pretendard', -apple-system, sans-serif;
      font-size: 12px;
      color: #666;
      flex-shrink: 0;
    }

    /* ── 장르 탭 ── */
    .genre-tabs {
      background: #000;
      display: flex;
      gap: 6px;
      padding: 0 16px 14px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
      cursor: grab;
      user-select: none;
    }
    .genre-tabs::-webkit-scrollbar { display: none; }
    .genre-tabs.dragging { cursor: grabbing; }

    /* ── BTS 프로모션 태그 회전 그라데이션 테두리 ── */
    @property --bts-angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    @keyframes bts-spin {
      to { --bts-angle: 360deg; }
    }

    .bts-border-wrap {
      flex-shrink: 0;
      position: relative;
      border-radius: 4px;
      padding: 1px;
      overflow: hidden;
      background: conic-gradient(from var(--bts-angle), #FF00A8, #D400FF, #FF44CC, #D400FF, #FF00A8);
      animation: bts-spin 3s linear infinite;
    }

    .genre-tab-bts {
      position: relative;
      z-index: 1;
      background: #1C1C1C;
      border: none;
      border-radius: 3px;
      color: #fff;
      font-size: 13px;
      font-family: 'Pretendard', -apple-system, sans-serif;
      padding: 0 10px;
      height: 32px;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      cursor: pointer;
    }

    .genre-tab {
      flex-shrink: 0;
      background: #1C1C1C;
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Pretendard', -apple-system, sans-serif;
      padding: 0 10px;
      height: 32px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .genre-tab img {
      height: 7px;
      width: auto;
      flex-shrink: 0;
    }

    /* ── 미니배너 ── */
    .minibanner {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 52px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.06);
      padding: 0 12px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .minibanner-img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .minibanner-texts {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .minibanner-title {
      font-family: 'Apple SD Gothic Neo', 'Pretendard', -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 700;
      line-height: 18px;
      letter-spacing: -0.14px;
      color: #F8F8F8;
    }

    .minibanner-sub {
      font-family: 'Apple SD Gothic Neo', 'Pretendard', -apple-system, sans-serif;
      font-size: 12px;
      font-weight: 400;
      line-height: 16px;
      letter-spacing: -0.12px;
      color: #FF00A8;
    }

    /* ── 검색 패널 (포커스 시 기록 표시) ── */
    #searchPanel {
      display: none;
      flex: 1;
      background: #121212;
      padding: 12px 16px 32px;
    }
    #searchPanel.visible { display: block; }

    /* ── 본문 ── */
    .content {
      flex: 1;
      background: #121212;
      padding: 12px 16px 32px;
    }

    /* ── 검색 기록 ── */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 17px;
      font-weight: 500;
      color: #fff;
      font-family: 'Pretendard', -apple-system, sans-serif;
    }

    .delete-all {
      font-size: 13px;
      color: #888;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }

    .history-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
      min-height: 70px;
      align-content: flex-start;
    }

    .history-empty {
      width: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      font-family: 'Pretendard', -apple-system, sans-serif;
      font-size: 14px;
      color: #888;
      height: 60px;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #191919;
      border-radius: 4px;
      padding: 0 12px;
      height: 34px;
      font-size: 13.5px;
      color: #fff;
      cursor: pointer;
    }

    .chip-remove {
      width: 14px;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      opacity: 0.5;
    }
    .chip-remove svg { display: block; }

    /* ── 추천 섹션 ── */
    .recommend-section { margin-bottom: 20px; }

    .recommend-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .recommend-text-wrap { flex: 1; }

    .recommend-username {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      font-family: 'Pretendard', -apple-system, sans-serif;
      display: block;
    }

    .recommend-sub {
      font-size: 17px;
      font-weight: 400;
      font-family: 'Pretendard', -apple-system, sans-serif;
      color: #fff;
      margin-top: 2px;
      display: block;
    }

    .info-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
    }
    .info-icon img { display: block; }

    /* ── 웹툰 카드 그리드 ── */

    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      column-gap: 8px;
      row-gap: 18px;
    }

    .card {
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .card-cover {
      width: 100%;
      aspect-ratio: 108 / 156;
      border-radius: 6px;
      overflow: hidden;
    }

    .card-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .new-badge {
      margin-top: 8px;
    }

    /* iOS/Caption/12 Regular — Primary-P03 (green) */
    .new-badge-text {
      font-family: 'Apple SD Gothic Neo', 'Pretendard', -apple-system, sans-serif;
      font-size: 12px;
      font-weight: 400;
      line-height: 16px;
      letter-spacing: -0.12px;
      color: #00C73C;
    }

    /* iOS/Body/14 Bold — Text-T01 (white) */
    .card-title {
      font-family: 'Apple SD Gothic Neo', 'Pretendard', -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 700;
      line-height: 18px;
      letter-spacing: -0.14px;
      color: #fff;
      margin-top: 2px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* iOS/Caption/12 Regular — Text-T03 (gray) */
    .card-sub {
      font-family: 'Apple SD Gothic Neo', 'Pretendard', -apple-system, sans-serif;
      font-size: 12px;
      font-weight: 400;
      line-height: 16px;
      letter-spacing: -0.12px;
      color: #888;
      margin-top: 2px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
<div class="phone">
<div class="page-main">

  <!-- 상단 네비 -->
  <div class="phone-header">
  <div class="top-nav">
    <span class="top-nav-title">검색</span>
    <div class="top-nav-right">
      <button class="nav-icon-btn"><img src="쿠키오븐_angle2.png" alt="쿠키" style="width:20px;height:20px;" /></button>
      <button class="nav-icon-btn"><img src="ic_nav_alert.png" alt="알림" /></button>
      <button class="nav-icon-btn"><img src="ic_nav_my.png" alt="내 정보" /></button>
    </div>
  </div>

  <!-- 검색바 -->
  <div class="top-bar">
    <div class="search-row">
      <div class="search-input-wrap">
        <div class="input-area">
          <input class="search-input" id="searchInput" type="search" autocomplete="off" />
          <div class="rolling-placeholder" id="rollingPlaceholder">
            <div class="rolling-track" id="rollingTrack"></div>
          </div>
        </div>
        <button class="search-clear" id="searchClear" onclick="clearSearch()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="8" fill="rgba(255,255,255,0.3)"/>
            <line x1="5" y1="5" x2="11" y2="11" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="11" y1="5" x2="5" y2="11" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="search-icon-btn" onclick="doSearch()">
          <img class="search-icon" src="ic_nav_right_search.png" alt="검색" />
        </button>
      </div>
      <button class="search-cancel" id="searchCancel" onclick="cancelSearch()">취소</button>
    </div>

    <!-- 장르 탭 -->
    <div class="genre-tabs" id="genreTabs">
      <div class="bts-border-wrap">
        <button class="genre-tab genre-tab-bts"><img src="bts.png" alt="" />BTS THE CITY</button>
      </div>
      <button class="genre-tab"><img src="sinjak.png" alt="최강신작" style="height:12px;width:auto;" /></button>
      <button class="genre-tab">레전드</button>
      <button class="genre-tab">시리즈</button>
      <button class="genre-tab">독점</button>
      <button class="genre-tab">#절륜나</button>
      <button class="genre-tab">#발칙녀</button>
      <button class="genre-tab">#재벌</button>
      <button class="genre-tab">#미스터리</button>
    </div>
  </div>
  </div><!-- /phone-header -->

  <div class="phone-body">
  <!-- 검색결과 패널 -->
  <div class="search-results" id="searchResults"></div>

  <!-- 본문 -->
  <div class="content">

    <!-- 미니배너 -->
    <div class="minibanner" style="margin-bottom: 20px;">
      <img class="minibanner-img" src="square.png" alt="" />
      <div class="minibanner-texts">
        <span class="minibanner-title">미니배너 타이틀 최대 30자</span>
        <span class="minibanner-sub">서브타이틀 최대 25자, 어드민 컬러입력 ›</span>
      </div>
    </div>

    <!-- 추천 섹션 -->
    <div class="recommend-section">
      <div class="recommend-header">
        <span class="recommend-sub">최신 이야기를 놓치고 계신거 같아요!</span>
      </div>
      <div class="card-grid" id="cardGrid"></div>
    </div>

  </div>

  <!-- 검색 패널: 포커스 시 검색 기록 표시 -->
  <div id="searchPanel">
    <div class="section-header">
      <span class="section-title">검색 기록</span>
      <button class="delete-all" onclick="clearHistory()">전체 삭제</button>
    </div>
    <div class="history-chips" id="historyChips">
      <div class="history-empty" id="historyEmpty">검색 기록이 없습니다</div>
      <div class="chip">
        <span>내 남편과 결혼해줘</span>
        <span class="chip-remove" onclick="removeChip(this)"><img src="ic_delete_search_close.png" width="14" height="14" /></span>
      </div>
      <div class="chip">
        <span>김부장</span>
        <span class="chip-remove" onclick="removeChip(this)"><img src="ic_delete_search_close.png" width="14" height="14" /></span>
      </div>
    </div>
  </div>

  </div><!-- /phone-body -->

</div><!-- /page-main -->

<!-- 이벤트 페이지 (페이지 푸시) -->
<div class="page-event" id="pageEvent">
  <button class="page-event-back" onclick="closeEventOverlay()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <line x1="6" y1="6" x2="18" y2="18" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <line x1="18" y1="6" x2="6" y2="18" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>
  <img class="page-event-img" id="eventOverlayImg" src="" alt="" />
</div>

</div><!-- /phone -->

<script>
  // 3x9 카드 그리드 생성
  (function () {
    const items = [
      { src: 'kimetsu.webp',   title: '귀멸의 칼날',     sub: '고토게 코요하루' },
      { src: 'onepiece.webp',  title: '원피스',           sub: '오다 에이이치로' },
      { src: 'dragonball.jpg', title: '드래곤볼Z',        sub: '토리야마 아키라' },
      { src: 'xl.jpg',         title: '황천의 츠가이',    sub: '아라카와 히로무' },
      { src: 'sakamoto.webp',  title: '사카모토 데이즈',  sub: '스즈키 유토' },
    ];
    const grid = document.getElementById('cardGrid');
    for (let i = 0; i < 27; i++) {
      const { src, title, sub } = items[i % items.length];
      grid.innerHTML += `
        <div class="card">
          <div class="card-cover">
            <img src="${src}" alt="${title}" />
          </div>
          <div class="new-badge"><div class="new-badge-text">새 이야기 10+</div></div>
          <div class="card-title">${title}</div>
          <div class="card-sub">${sub}</div>
        </div>`;
    }
  })();

  // 이벤트 페이지 푸시
  const PROMO_IMAGES = ['울빌.png', '단행본세트관.jpg', '마크다운.jpg'];
  let eventFromSearch = false;

  function showEventOverlay(imgIdx, fromSearch) {
    eventFromSearch = fromSearch;
    document.getElementById('eventOverlayImg').src = PROMO_IMAGES[imgIdx] || PROMO_IMAGES[0];
    document.querySelector('.phone').classList.add('event-open');
    document.getElementById('searchInput').blur();
  }
  function closeEventOverlay() {
    document.querySelector('.phone').classList.remove('event-open');
    if (!eventFromSearch) {
      cancelSearch();
    }
  }

  // 플레이스홀더 롤링 (4.5초)
  const rolling = (function () {
    const texts = [
      '울어봐 빌어도 좋고 무료 이벤트! 🥹',
      '오늘만 전작 무료 공개 이벤트! 🎁',
      '신작 로맨스 첫화 무료로 만나보세요! 💘'
    ];
    const ITEM_H = 44;
    const track = document.getElementById('rollingTrack');
    const input = document.getElementById('searchInput');

    [...texts, texts[0]].forEach(t => {
      const span = document.createElement('span');
      span.textContent = t;
      track.appendChild(span);
    });

    let idx = 0;
    let timer;

    function roll() {
      idx++;
      track.style.transition = 'transform 0.6s cubic-bezier(0.4,0,0.2,1)';
      track.style.transform = `translateY(-${idx * ITEM_H}px)`;
      if (idx === texts.length) {
        setTimeout(() => {
          track.style.transition = 'none';
          track.style.transform = 'translateY(0)';
          idx = 0;
        }, 620);
      }
    }

    function start() { timer = setInterval(roll, 4500); }
    function stop()  { clearInterval(timer); }

    start();

    input.addEventListener('input', () => {
      if (input.value) { stop(); }
      else             { start(); }
    });

    return { getIdx: () => idx };
  })();

  // 장르 탭 플리킹
  (function () {
    const el = document.getElementById('genreTabs');
    let isDragging = false, startX, scrollLeft, velX = 0, lastX, lastT, rafId;

    el.addEventListener('mousedown', e => {
      isDragging = true;
      startX = e.pageX; scrollLeft = el.scrollLeft;
      velX = 0; lastX = e.pageX; lastT = Date.now();
      el.classList.add('dragging');
      cancelAnimationFrame(rafId);
    });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const now = Date.now();
      velX = (e.pageX - lastX) / (now - lastT || 1);
      lastX = e.pageX; lastT = now;
      el.scrollLeft = scrollLeft - (e.pageX - startX);
    });
    window.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      el.classList.remove('dragging');
      let v = velX * 14;
      (function momentum() {
        if (Math.abs(v) < 0.5) return;
        el.scrollLeft -= v; v *= 0.92;
        rafId = requestAnimationFrame(momentum);
      })();
    });
    el.addEventListener('click', e => {
      if (Math.abs(el.scrollLeft - scrollLeft) > 5) e.stopPropagation();
    }, true);
  })();

  // 검색어 자동완성
  const SEARCH_DATA = [
    { title: '귀멸의 칼날', type: 'COMIX' },
    { title: '귀멸의 칼날: 무한열차', type: 'NOVEL' },
    { title: '원피스', type: 'COMIX' },
    { title: '원피스 단행본', type: 'COMIX' },
    { title: '드래곤볼Z', type: 'COMIX' },
    { title: '드래곤볼 슈퍼', type: 'COMIX' },
    { title: '황천의 츠가이', type: 'COMIX' },
    { title: '사카모토 데이즈', type: 'COMIX' },
    { title: '내 남편과 결혼해줘', type: 'NOVEL' },
    { title: '내 남편', type: 'NOVEL' },
    { title: '김부장', type: 'NOVEL' },
    { title: '로맨스 판타지', type: 'NOVEL' },
    { title: '로맨스 소설', type: 'NOVEL' },
    { title: '로판 추천', type: '' },
  ];

  function highlight(text, query) {
    if (!query) return text;
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    if (idx === -1) return text;
    return text.slice(0, idx) +
      `<mark>${text.slice(idx, idx + query.length)}</mark>` +
      text.slice(idx + query.length);
  }

  function showResults(query) {
    const panel = document.getElementById('searchResults');
    const results = SEARCH_DATA.filter(d =>
      d.title.toLowerCase().includes(query.toLowerCase())
    ).slice(0, 8);
    if (!query || results.length === 0) { panel.classList.remove('visible'); return; }
    panel.innerHTML =
      results.map((r, i) => `
        <div class="search-result-item">
          <span class="search-result-text">${highlight(r.title, query)}</span>
          ${i === 0 ? `<img src="sinjak.png" alt="최강신작" style="height:12px;width:auto;flex-shrink:0;" />` : ''}
        </div>`).join('');
    panel.classList.add('visible');
  }

  function clearSearch() {
    const input = document.getElementById('searchInput');
    input.value = '';
    input.focus();
    document.querySelector('.search-row').classList.remove('has-value');
    document.getElementById('searchResults').classList.remove('visible');
    document.getElementById('searchPanel').classList.add('visible');
    document.getElementById('rollingPlaceholder').style.visibility = 'visible';
  }

  function cancelSearch() {
    const input = document.getElementById('searchInput');
    input.value = '';
    input.blur();
    document.querySelector('.search-row').classList.remove('active');
    document.getElementById('searchResults').classList.remove('visible');
    document.getElementById('searchPanel').classList.remove('visible');
    document.getElementById('rollingPlaceholder').style.visibility = 'visible';
    document.querySelector('.content').style.display = '';
    document.getElementById('genreTabs').style.display = '';
  }

  document.getElementById('searchInput').addEventListener('focus', () => {
    document.querySelector('.search-row').classList.add('active');
    document.querySelector('.content').style.display = 'none';
    document.getElementById('genreTabs').style.display = 'none';
    document.getElementById('searchPanel').classList.add('visible');
  });

  document.getElementById('searchInput').addEventListener('input', e => {
    const val = e.target.value;
    const row = document.querySelector('.search-row');
    document.getElementById('rollingPlaceholder').style.visibility = val ? 'hidden' : 'visible';
    row.classList.toggle('has-value', !!val);
    if (val) {
      document.getElementById('searchPanel').classList.remove('visible');
      showResults(val);
    } else {
      document.getElementById('searchResults').classList.remove('visible');
      document.getElementById('searchPanel').classList.add('visible');
    }
  });

  // 검색 기록
  function checkEmpty() {
    const chips = document.querySelectorAll('#historyChips .chip');
    document.getElementById('historyEmpty').style.display = chips.length === 0 ? 'flex' : 'none';
  }
  function removeChip(btn) { btn.closest('.chip').remove(); checkEmpty(); }
  function clearHistory()  {
    document.querySelectorAll('#historyChips .chip').forEach(c => c.remove());
    checkEmpty();
  }

  function doSearch() {
    const input = document.getElementById('searchInput');
    const wasSearchActive = document.querySelector('.search-row').classList.contains('active');
    input.focus();
    const val = input.value.trim();
    if (!val) {
      showEventOverlay(rolling.getIdx(), wasSearchActive);
      return;
    }
    const chips = document.getElementById('historyChips');
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `<span>${val}</span><span class="chip-remove" onclick="removeChip(this)"><img src="ic_delete_search_close.png" width="14" height="14" /></span>`;
    chips.prepend(chip);
    input.value = '';
    document.querySelector('.search-row').classList.remove('has-value');
    document.getElementById('rollingPlaceholder').style.visibility = 'visible';
    document.getElementById('searchResults').classList.remove('visible');
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const val = e.target.value.trim();
    if (!val) { showEventOverlay(rolling.getIdx(), true); return; }
    doSearch();
  });
</script>
</body>
</html>
