<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>웹툰 검색</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .phone {
      width: 100%;
      max-width: 390px;
      background: #121212;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── iOS 상태바 ── */
    .status-bar {
      background: #000;
      height: 54px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 24px 10px;
      flex-shrink: 0;
      position: relative;
    }

    /* 다이나믹 아일랜드 */
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
    }

    .status-time {
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
      font-family: 'Pretendard', -apple-system, sans-serif;
      line-height: 1;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    /* ── 검색바 ── */
    .top-bar {
      background: #000;
      padding: 0;
    }

    .search-row {
      display: flex;
      align-items: center;
      padding: 8px 16px 12px;
    }

    .search-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(144, 144, 144, 0.20);
      border-radius: 4px;
      padding: 0 12px;
      height: 44px;
    }

    .search-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .input-area {
      flex: 1;
      position: relative;
      height: 100%;
      overflow: hidden;
    }

    .search-input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 15px;
      font-family: 'Pretendard', -apple-system, sans-serif;
      caret-color: #00C73C;
      z-index: 1;
    }
    .search-input::placeholder { color: transparent; }

    .rolling-placeholder {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .rolling-track {
      display: flex;
      flex-direction: column;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .rolling-track span {
      height: 44px;
      display: flex;
      align-items: center;
      white-space: nowrap;
      color: #fff;
      font-size: 15px;
      font-family: 'Pretendard', -apple-system, sans-serif;
      flex-shrink: 0;
    }

    /* ── 장르 탭 ── */
    .genre-tabs {
      background: #000;
      display: flex;
      gap: 6px;
      padding: 0 16px 14px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
      cursor: grab;
      user-select: none;
    }
    .genre-tabs::-webkit-scrollbar { display: none; }
    .genre-tabs.dragging { cursor: grabbing; }

    .genre-tab {
      flex-shrink: 0;
      background: #1C1C1C;
      border: none;
      color: #fff;
      font-size: 13px;
      font-family: 'Pretendard', -apple-system, sans-serif;
      padding: 0 10px;
      height: 32px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .genre-tab img {
      height: 7px;
      width: auto;
      flex-shrink: 0;
    }

    /* ── 본문 ── */
    .content {
      flex: 1;
      background: #121212;
      padding: 20px 16px 0;
    }

    /* ── 검색 기록 ── */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 17px;
      font-weight: 500;
      color: #fff;
      font-family: 'Pretendard', -apple-system, sans-serif;
    }

    .delete-all {
      font-size: 13px;
      color: #888;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }

    .history-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 28px;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #191919;
      border-radius: 4px;
      padding: 0 12px;
      height: 34px;
      font-size: 13.5px;
      color: #fff;
      cursor: pointer;
    }

    .chip-remove {
      width: 14px;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      opacity: 0.5;
    }
    .chip-remove svg { display: block; }

    /* ── 추천 섹션 ── */
    .recommend-section { margin-bottom: 20px; }

    .recommend-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .recommend-text-wrap { flex: 1; }

    .recommend-username {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      font-family: 'Pretendard', -apple-system, sans-serif;
      display: block;
    }

    .recommend-sub {
      font-size: 17px;
      font-weight: 400;
      font-family: 'Pretendard', -apple-system, sans-serif;
      color: #fff;
      margin-top: 2px;
      display: block;
    }

    .info-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
    }
    .info-icon img { display: block; }

    /* ── 웹툰 카드 그리드 ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .card {
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .card-cover {
      width: 100%;
      aspect-ratio: 108 / 156;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    .card-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .new-badge {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.6));
      padding: 18px 7px 6px;
    }

    /* iOS/Caption/12 Regular — Primary-P03 (green) */
    .new-badge-text {
      font-family: 'Apple SD Gothic Neo', 'Pretendard', -apple-system, sans-serif;
      font-size: 12px;
      font-weight: 400;
      line-height: 16px;
      letter-spacing: -0.12px;
      color: #00C73C;
    }

    /* iOS/Body/14 Bold — Text-T01 (white) */
    .card-title {
      font-family: 'Apple SD Gothic Neo', 'Pretendard', -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 700;
      line-height: 18px;
      letter-spacing: -0.14px;
      color: #fff;
      margin-top: 8px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* iOS/Caption/12 Regular — Text-T03 (gray) */
    .card-sub {
      font-family: 'Apple SD Gothic Neo', 'Pretendard', -apple-system, sans-serif;
      font-size: 12px;
      font-weight: 400;
      line-height: 16px;
      letter-spacing: -0.12px;
      color: #888;
      margin-top: 2px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
<div class="phone">

  <!-- iOS 상태바 -->
  <div class="status-bar">
    <div class="dynamic-island"></div>
    <span class="status-time" id="statusTime">9:41</span>
    <div class="status-icons">
      <!-- 셀룰러 -->
      <svg width="18" height="12" viewBox="0 0 18 12" fill="#fff">
        <rect x="0"   y="8"   width="3" height="4" rx="0.6"/>
        <rect x="5"   y="5.5" width="3" height="6.5" rx="0.6"/>
        <rect x="10"  y="3"   width="3" height="9" rx="0.6"/>
        <rect x="15"  y="0"   width="3" height="12" rx="0.6"/>
      </svg>
      <!-- 와이파이 -->
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="#fff" stroke-linecap="round" stroke-width="1.6">
        <path d="M0.8 4.2C3.8 1.3 12.2 1.3 15.2 4.2"/>
        <path d="M3.2 6.6C5.1 4.9 10.9 4.9 12.8 6.6"/>
        <path d="M5.7 9C6.8 8.1 9.2 8.1 10.3 9"/>
        <circle cx="8" cy="11.2" r="0.9" fill="#fff" stroke="none"/>
      </svg>
      <!-- 배터리 -->
      <svg width="27" height="13" viewBox="0 0 27 13" fill="none">
        <rect x="0.6" y="0.6" width="22" height="11.8" rx="3" stroke="#fff" stroke-width="1.2"/>
        <rect x="2" y="2" width="17.5" height="9" rx="1.8" fill="#fff"/>
        <path d="M24 4.5 C25.5 4.5 25.5 8.5 24 8.5" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <!-- 검색바 -->
  <div class="top-bar">
    <div class="search-row">
      <div class="search-input-wrap">
        <div class="input-area">
          <input class="search-input" id="searchInput" type="search" autocomplete="off" />
          <div class="rolling-placeholder" id="rollingPlaceholder">
            <div class="rolling-track" id="rollingTrack"></div>
          </div>
        </div>
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2">
          <circle cx="11" cy="11" r="7"/>
          <line x1="16.5" y1="16.5" x2="22" y2="22"/>
        </svg>
      </div>
    </div>

    <!-- 장르 탭 -->
    <div class="genre-tabs" id="genreTabs">
      <button class="genre-tab"><img src="bts.png" alt="" />BTS THE CITY</button>
      <button class="genre-tab">판타지</button>
      <button class="genre-tab">무협</button>
      <button class="genre-tab">로맨스</button>
      <button class="genre-tab">로맨스판타지</button>
      <button class="genre-tab">로판</button>
      <button class="genre-tab">현대물</button>
      <button class="genre-tab">BL</button>
      <button class="genre-tab">스포츠</button>
    </div>
  </div>

  <!-- 본문 -->
  <div class="content">

    <!-- 검색 기록 -->
    <div class="section-header">
      <span class="section-title">검색 기록</span>
      <button class="delete-all" onclick="clearHistory()">전체 삭제</button>
    </div>

    <div class="history-chips" id="historyChips">
      <div class="chip">
        <span>내 남편과 결혼해줘</span>
        <span class="chip-remove" onclick="removeChip(this)"><img src="ic_delete_search_close.png" width="14" height="14" /></span>
      </div>
      <div class="chip">
        <span>김부장</span>
        <span class="chip-remove" onclick="removeChip(this)"><img src="ic_delete_search_close.png" width="14" height="14" /></span>
      </div>
    </div>

    <!-- 추천 섹션 -->
    <div class="recommend-section">
      <div class="recommend-header">
        <div class="recommend-text-wrap">
          <span class="recommend-username">series111님</span>
          <span class="recommend-sub">최신 이야기를 놓치고 계신거 같아요!</span>
        </div>
        <div class="info-icon"><img src="ic_info_action.png" width="20" height="20" /></div>
      </div>

      <div class="card-grid" id="cardGrid"></div>
    </div>

  </div>
</div>

<script>
  // 3x9 카드 그리드 생성
  (function () {
    const items = [
      { src: 'kimetsu.webp',   title: '귀멸의 칼날',     sub: '고토게 코요하루' },
      { src: 'onepiece.webp',  title: '원피스',           sub: '오다 에이이치로' },
      { src: 'dragonball.jpg', title: '드래곤볼Z',        sub: '토리야마 아키라' },
      { src: 'xl.jpg',         title: '황천의 츠가이',    sub: '아라카와 히로무' },
      { src: 'sakamoto.webp',  title: '사카모토 데이즈',  sub: '스즈키 유토' },
    ];
    const grid = document.getElementById('cardGrid');
    for (let i = 0; i < 27; i++) {
      const { src, title, sub } = items[i % items.length];
      grid.innerHTML += `
        <div class="card">
          <div class="card-cover">
            <img src="${src}" alt="${title}" />
            <div class="new-badge"><div class="new-badge-text">새 이야기 10+</div></div>
          </div>
          <div class="card-title">${title}</div>
          <div class="card-sub">${sub}</div>
        </div>`;
    }
  })();

  // 상태바 시간
  (function () {
    function update() {
      const now = new Date();
      const h = now.getHours();
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('statusTime').textContent = `${h}:${m}`;
    }
    update();
    setInterval(update, 1000);
  })();

  // 플레이스홀더 롤링 (3초)
  (function () {
    const texts = [
      '울어봐 빌어도 좋고 무료 이벤트!',
      '오늘만 전작 무료 공개 이벤트!',
      '신작 로맨스 첫화 무료로 만나보세요!'
    ];
    const ITEM_H = 44;
    const wrap = document.getElementById('rollingPlaceholder');
    const track = document.getElementById('rollingTrack');
    const input = document.getElementById('searchInput');

    [...texts, texts[0]].forEach(t => {
      const span = document.createElement('span');
      span.textContent = t;
      track.appendChild(span);
    });

    let idx = 0;
    let timer;

    function roll() {
      idx++;
      track.style.transition = 'transform 0.45s cubic-bezier(0.4,0,0.2,1)';
      track.style.transform = `translateY(-${idx * ITEM_H}px)`;
      if (idx === texts.length) {
        setTimeout(() => {
          track.style.transition = 'none';
          track.style.transform = 'translateY(0)';
          idx = 0;
        }, 460);
      }
    }

    function start() { timer = setInterval(roll, 3000); }
    function stop()  { clearInterval(timer); }

    start();

    input.addEventListener('input', () => {
      if (input.value) { wrap.style.visibility = 'hidden'; stop(); }
      else             { wrap.style.visibility = 'visible'; start(); }
    });
  })();

  // 장르 탭 플리킹
  (function () {
    const el = document.getElementById('genreTabs');
    let isDragging = false, startX, scrollLeft, velX = 0, lastX, lastT, rafId;

    el.addEventListener('mousedown', e => {
      isDragging = true;
      startX = e.pageX; scrollLeft = el.scrollLeft;
      velX = 0; lastX = e.pageX; lastT = Date.now();
      el.classList.add('dragging');
      cancelAnimationFrame(rafId);
    });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const now = Date.now();
      velX = (e.pageX - lastX) / (now - lastT || 1);
      lastX = e.pageX; lastT = now;
      el.scrollLeft = scrollLeft - (e.pageX - startX);
    });
    window.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      el.classList.remove('dragging');
      let v = velX * 14;
      (function momentum() {
        if (Math.abs(v) < 0.5) return;
        el.scrollLeft -= v; v *= 0.92;
        rafId = requestAnimationFrame(momentum);
      })();
    });
    el.addEventListener('click', e => {
      if (Math.abs(el.scrollLeft - scrollLeft) > 5) e.stopPropagation();
    }, true);
  })();

  // 검색 기록
  function removeChip(btn) { btn.closest('.chip').remove(); }
  function clearHistory()  { document.getElementById('historyChips').innerHTML = ''; }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const val = e.target.value.trim();
    if (!val) return;
    const chips = document.getElementById('historyChips');
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `<span>${val}</span><span class="chip-remove" onclick="removeChip(this)"><img src="ic_delete_search_close.png" width="14" height="14" /></span>`;
    chips.prepend(chip);
    e.target.value = '';
    document.getElementById('rollingPlaceholder').style.visibility = 'visible';
  });
</script>
</body>
</html>
