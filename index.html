<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>웹툰 검색</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f2f2f2;
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .phone {
      width: 100%;
      max-width: 390px;
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── 상단 검색바 ── */
    .top-bar {
      background: #111;
      padding: 12px 16px 0;
    }

    .search-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 12px;
    }

    .up-badge {
      background: #00C73C;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 3px;
      letter-spacing: -0.3px;
      flex-shrink: 0;
    }

    .search-input-wrap {
      flex: 1;
      position: relative;
    }

    .search-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      caret-color: #00C73C;
    }

    .search-input::placeholder { color: #888; }

    .search-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      cursor: pointer;
      opacity: 0.8;
    }

    /* ── 장르 탭 ── */
    .genre-tabs {
      background: #111;
      display: flex;
      gap: 8px;
      padding: 0 16px 14px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .genre-tabs::-webkit-scrollbar { display: none; }

    .genre-tab {
      flex-shrink: 0;
      background: transparent;
      border: 1.5px solid #444;
      color: #ddd;
      font-size: 13px;
      font-family: inherit;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .genre-tab:hover,
    .genre-tab.active {
      border-color: #fff;
      color: #fff;
    }

    /* ── 본문 ── */
    .content {
      flex: 1;
      background: #fff;
      padding: 20px 16px 0;
    }

    /* ── 검색 기록 ── */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: #111;
    }

    .delete-all {
      font-size: 13px;
      color: #888;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }
    .delete-all:hover { color: #555; }

    .history-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f2f2f2;
      border-radius: 20px;
      padding: 7px 12px;
      font-size: 13.5px;
      color: #222;
      cursor: pointer;
    }

    .chip-remove {
      width: 14px;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #888;
      font-size: 12px;
      flex-shrink: 0;
    }
    .chip-remove:hover { color: #333; }

    /* ── 추천 섹션 ── */
    .recommend-section {
      margin-bottom: 20px;
    }

    .recommend-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .recommend-text-wrap { flex: 1; }

    .recommend-username {
      font-size: 15px;
      font-weight: 700;
      color: #111;
      display: block;
    }

    .recommend-sub {
      font-size: 13.5px;
      color: #444;
      margin-top: 2px;
      display: block;
    }

    .info-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid #bbb;
      color: #bbb;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
    }

    /* ── 웹툰 카드 ── */
    .card-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    .card-row::-webkit-scrollbar { display: none; }

    .card {
      flex-shrink: 0;
      width: calc((100% - 20px) / 3);
      min-width: 108px;
      cursor: pointer;
    }

    .card-cover {
      width: 100%;
      aspect-ratio: 3/4;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      background: #ddd;
    }

    .card-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 이미지 없을 때 그라디언트 플레이스홀더 */
    .cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 8px;
    }
    .cover-placeholder span {
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      line-height: 1.2;
    }

    .new-badge {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.55));
      padding: 18px 7px 6px;
    }

    .new-badge-text {
      color: #00C73C;
      font-size: 11px;
      font-weight: 700;
    }

    .card-title {
      font-size: 12.5px;
      color: #222;
      margin-top: 6px;
      line-height: 1.35;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* ── 가상 키보드 ── */
    .keyboard {
      background: #d1d5db;
      padding: 8px 4px 20px;
      flex-shrink: 0;
    }

    .kb-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    .kb-key {
      background: #fff;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 400;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 1px 0 #999;
      transition: background 0.1s;
      user-select: none;
      flex: 1;
      height: 42px;
    }
    .kb-key:active { background: #aaa; }

    .kb-key.dark {
      background: #adb5bd;
      color: #000;
    }

    .kb-key.wide { flex: 1.5; font-size: 13px; }
    .kb-key.space { flex: 4; font-size: 14px; color: #333; }
    .kb-key.backspace { font-size: 13px; }

    .kb-bottom-row {
      display: flex;
      justify-content: center;
      gap: 6px;
    }
  </style>
</head>
<body>
<div class="phone">

  <!-- 상단 검색바 -->
  <div class="top-bar">
    <div class="search-row">
      <span class="up-badge">UP</span>
      <div class="search-input-wrap">
        <input
          class="search-input"
          id="searchInput"
          type="text"
          placeholder="울어봐 빌어도 좋고 무료 이벤트!"
          autocomplete="off"
        />
      </div>
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
        <circle cx="11" cy="11" r="7"/>
        <line x1="16.5" y1="16.5" x2="22" y2="22"/>
      </svg>
    </div>

    <!-- 장르 탭 -->
    <div class="genre-tabs">
      <button class="genre-tab">판타지</button>
      <button class="genre-tab">무협</button>
      <button class="genre-tab active">로맨스</button>
      <button class="genre-tab">로맨스판타지</button>
      <button class="genre-tab">로판</button>
      <button class="genre-tab">현대물</button>
      <button class="genre-tab">BL</button>
      <button class="genre-tab">스포츠</button>
    </div>
  </div>

  <!-- 본문 -->
  <div class="content">

    <!-- 검색 기록 -->
    <div class="section-header">
      <span class="section-title">검색 기록</span>
      <button class="delete-all" onclick="clearHistory()">전체 삭제</button>
    </div>

    <div class="history-chips" id="historyChips">
      <div class="chip">
        <span>내 남편과 결혼해줘</span>
        <span class="chip-remove" onclick="removeChip(this)">✕</span>
      </div>
      <div class="chip">
        <span>김부장</span>
        <span class="chip-remove" onclick="removeChip(this)">✕</span>
      </div>
    </div>

    <!-- 추천 섹션 -->
    <div class="recommend-section">
      <div class="recommend-header">
        <div class="recommend-text-wrap">
          <span class="recommend-username">series111님</span>
          <span class="recommend-sub">최신 이야기를 놓치고 계신거 같아요!</span>
        </div>
        <div class="info-icon">i</div>
      </div>

      <div class="card-row">

        <!-- 카드 1: 김부장 -->
        <div class="card">
          <div class="card-cover">
            <div class="cover-placeholder" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);">
              <span>김부장</span>
            </div>
            <div class="new-badge">
              <div class="new-badge-text">새 이야기 10+</div>
            </div>
          </div>
          <div class="card-title">김부장</div>
        </div>

        <!-- 카드 2: 하루만 네가 되고 싶어 -->
        <div class="card">
          <div class="card-cover">
            <div class="cover-placeholder" style="background: linear-gradient(160deg, #2c1810 0%, #8B4513 40%, #D4A017 100%);">
              <span>하루만 네가 되고 싶어</span>
            </div>
            <div class="new-badge">
              <div class="new-badge-text">새 이야기 10+</div>
            </div>
          </div>
          <div class="card-title">하루만 네가 되고 싶어</div>
        </div>

        <!-- 카드 3: 주술회전 -->
        <div class="card">
          <div class="card-cover">
            <div class="cover-placeholder" style="background: linear-gradient(160deg, #e8e0d0 0%, #c8b89a 50%, #a09070 100%);">
              <span style="color:#222;">주술회전<br>[단행본]</span>
            </div>
            <div class="new-badge">
              <div class="new-badge-text">새 이야기 10+</div>
            </div>
          </div>
          <div class="card-title">주술회전 [단행본]</div>
        </div>

      </div>
    </div>
  </div>

  <!-- 가상 키보드 -->
  <div class="keyboard" id="keyboard">
    <div class="kb-row">
      <div class="kb-key" onclick="type('q')">Q</div>
      <div class="kb-key" onclick="type('w')">W</div>
      <div class="kb-key" onclick="type('e')">E</div>
      <div class="kb-key" onclick="type('r')">R</div>
      <div class="kb-key" onclick="type('t')">T</div>
      <div class="kb-key" onclick="type('y')">Y</div>
      <div class="kb-key" onclick="type('u')">U</div>
      <div class="kb-key" onclick="type('i')">I</div>
      <div class="kb-key" onclick="type('o')">O</div>
      <div class="kb-key" onclick="type('p')">P</div>
    </div>
    <div class="kb-row">
      <div class="kb-key" onclick="type('a')">A</div>
      <div class="kb-key" onclick="type('s')">S</div>
      <div class="kb-key" onclick="type('d')">D</div>
      <div class="kb-key" onclick="type('f')">F</div>
      <div class="kb-key" onclick="type('g')">G</div>
      <div class="kb-key" onclick="type('h')">H</div>
      <div class="kb-key" onclick="type('j')">J</div>
      <div class="kb-key" onclick="type('k')">K</div>
      <div class="kb-key" onclick="type('l')">L</div>
    </div>
    <div class="kb-row">
      <div class="kb-key dark wide">⇧</div>
      <div class="kb-key" onclick="type('z')">Z</div>
      <div class="kb-key" onclick="type('x')">X</div>
      <div class="kb-key" onclick="type('c')">C</div>
      <div class="kb-key" onclick="type('v')">V</div>
      <div class="kb-key" onclick="type('b')">B</div>
      <div class="kb-key" onclick="type('n')">N</div>
      <div class="kb-key" onclick="type('m')">M</div>
      <div class="kb-key dark wide backspace" onclick="backspace()">⌫</div>
    </div>
    <div class="kb-bottom-row">
      <div class="kb-key dark wide">123</div>
      <div class="kb-key space" onclick="type(' ')">space</div>
      <div class="kb-key dark wide">return</div>
    </div>
  </div>

</div>

<script>
  // 장르 탭 클릭
  document.querySelectorAll('.genre-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.genre-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
    });
  });

  // 가상 키보드 입력
  function type(char) {
    const input = document.getElementById('searchInput');
    input.value += char;
    input.focus();
  }

  function backspace() {
    const input = document.getElementById('searchInput');
    input.value = input.value.slice(0, -1);
    input.focus();
  }

  // 검색 기록 칩 삭제
  function removeChip(btn) {
    btn.closest('.chip').remove();
  }

  function clearHistory() {
    document.getElementById('historyChips').innerHTML = '';
  }

  // 엔터키 처리
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const val = e.target.value.trim();
      if (!val) return;
      const chips = document.getElementById('historyChips');
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.innerHTML = `<span>${val}</span><span class="chip-remove" onclick="removeChip(this)">✕</span>`;
      chips.prepend(chip);
      e.target.value = '';
    }
  });
</script>
</body>
</html>
